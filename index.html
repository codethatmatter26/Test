<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: black; }
        canvas { border: 1px solid white; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Paddle dimensions
        const paddleWidth = 10, paddleHeight = 100;
        const ballSize = 10;

        // Paddles and ball
        const playerPaddle = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, speed: 2 }; 
        const aiPaddle = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, speed: 2 };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: ballSize, speedX: 4, speedY: 4 };

        let playerScore = 0, aiScore = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw paddles
            ctx.fillStyle = 'white';
            ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            ctx.fillRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height);

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw scoreboard
            ctx.font = '20px Arial';
            ctx.fillText(`${playerScore}`, canvas.width / 4, 20);
            ctx.fillText(`${aiScore}`, (canvas.width * 3) / 4, 20);
        }

        function update() {
            // Move the ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.speedY *= -1;
            }

            // Ball collision with paddles
            if (
                ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.speedX *= -1;
            }
            if (
                ball.x + ball.radius > aiPaddle.x &&
                ball.y > aiPaddle.y &&
                ball.y < aiPaddle.y + aiPaddle.height
            ) {
                ball.speedX *= -1;
            }

            // Score update
            if (ball.x - ball.radius < 0) {
                aiScore++;
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                resetBall();
            }

            // AI paddle movement
            if (aiPaddle.y + paddleHeight / 2 < ball.y) {
                aiPaddle.y += aiPaddle.speed;
            } else {
                aiPaddle.y -= aiPaddle.speed;
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX *= -1;
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = event.clientY - rect.top;
            playerPaddle.y = mouseY - playerPaddle.height / 2;
            // Keep the paddle within bounds
            if (playerPaddle.y < 0) playerPaddle.y = 0;
            if (playerPaddle.y + playerPaddle.height > canvas.height) playerPaddle.y = canvas.height - playerPaddle.height;
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') {
                playerPaddle.y -= playerPaddle.speed;
                if (playerPaddle.y < 0) playerPaddle.y = 0;
            }
            if (event.key === 'ArrowDown') {
                playerPaddle.y += playerPaddle.speed;
                if (playerPaddle.y + playerPaddle.height > canvas.height) playerPaddle.y = canvas.height - playerPaddle.height;
            }
        });

        gameLoop();
    </script>
</body>
</html>
